<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Responsive Images</title>
    <meta name="author" content="Gustavo Shuan">
    <meta name="description" content="this page demonstrates the use of responsive images in HTML">
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>
    <main> 
        <div class="hero">
            <picture>
                <source media="(min-width: 500px)" srcset="images/manti-temple-medium.jpg">
                <source media="(min-width: 1000px)" srcset="images/manti-temple-large.jpg">
                <img src="images/manti-temple-small.jpg" alt="Manti Temple" width="500" height="250">
            </picture>
        </div>
    </main>


</body>
</html>
