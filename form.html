<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Product review form where users can submit ratings, features, and feedback about products.">
<meta name="author" content="Gustavo Shuan">
<title>Product Review</title>

<link rel="stylesheet" href="styles/form.css">
<script src="scripts/form.js" defer></script>
</head>

<body>

<header>
    <h1>Product Review Form</h1>
</header>

<main>
<form method="get" action="review.html">

    <!-- Product -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
    </select>

    <!-- Rating -->
<fieldset>
    <legend>Overall Rating</legend>

    <input type="radio" id="rating1" name="rating" value="1" required>
    <label for="rating1">☆</label>

    <input type="radio" id="rating2" name="rating" value="2" required>
    <label for="rating2">☆☆</label>

    <input type="radio" id="rating3" name="rating" value="3" required>
    <label for="rating3">☆☆☆</label>

    <input type="radio" id="rating4" name="rating" value="4" required>
    <label for="rating4">☆☆☆☆</label>

    <input type="radio" id="rating5" name="rating" value="5" required>
    <label for="rating5">☆☆☆☆☆</label>

</fieldset>

    <!-- Date -->
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    <!-- Features -->
<fieldset>
    <legend>Useful Features</legend>

    <input type="checkbox" id="durable" name="features[]" value="Durable">
    <label for="durable">Durable</label>

    <input type="checkbox" id="easy" name="features[]" value="Easy Use">
    <label for="easy">Easy Use</label>

    <input type="checkbox" id="affordable" name="features[]" value="Affordable">
    <label for="affordable">Affordable</label>

    <input type="checkbox" id="quality" name="features[]" value="High Quality">
    <label for="quality">High Quality</label>

</fieldset>

    <!-- Review -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review"></textarea>

    <!-- Name -->
    <label for="username">User Name</label>
    <input type="text" id="username" name="username">

    <!-- Submit -->
    <input type="submit" value="Submit Review">

</form>
</main>

<footer>
    <p>© <span id="year"></span> Gustavo Shuan - Perú</p>
    <p id="lastModified"></p>
</footer>

</body>
</html>
