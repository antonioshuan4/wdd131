<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Switzerland Page - Gustavo Shuan</title>

    <meta name="author" content="Gustavo Shuan">
    <meta name="description" content="Explore Switzerland's key data including its area, population, and weather.">

    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>

<body>
    <header>
        <h1>Switzerland</h1>
    </header>

    <main>

        <!-- HERO -->
        <div class="hero">
            <picture>
                <!-- imagen grande -->
                <source srcset="images/hero-large.webp" media="(min-width: 768px)">
                <!-- imagen pequeña -->
                <img src="images/hero-small.webp" alt="Beautiful landscape of Switzerland">
            </picture>
        </div>

        <!-- CONTENIDO -->
        <div class="content">

            <!-- DATA -->
            <section class="card data">
                <h2>Data</h2>
                <p><b>Area:</b> 41,285 sq km</p>
                <p><b>Population:</b> 9,007,798</p>
                <p><b>Capital:</b> Bern</p>
                <p><b>Languages:</b> German, French, Italian, Romansh</p>
                <p><b>Currency:</b> Swiss Franc</p>
            </section>

            <!-- WEATHER -->
            <section class="card weather">
                <h2 id="weather-title">Weather</h2>

                <!-- SVG (solo mobile) -->
                <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

                <p><b>Temperature:</b> <span id="temp">10</span> °C</p>
                <p><b>Conditions:</b> Partly Cloudy</p>
                <p><b>Wind:</b> <span id="wind">5</span> km/h</p>
                <p><b>Wind Chill:</b> <span id="windchill"></span></p>
            </section>

        </div>

    </main>

    <footer>
        <p>© <span id="currentyear"></span> | Gustavo Shuan | Peru</p>
        <p>Last Modification: <span id="lastModified"></span></p>
    </footer>

</body>
</html>
