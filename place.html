<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Switzerland Page - Gustavo Shuan</title>
    <meta name="author" content="Gustavo Shuan">
    <meta name="description" content="Assignment W03: Country Page for Switzerland.">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
</head>

<body>
    <header>
        <h1>Switzerland</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 800px)">
                <img src="images/country-picture.webp" alt="Beautiful landscape of Switzerland" class="hero-img">
            </picture>

            <section class="card data">
                <h3>Data</h3>
                <p><b>Area:</b> 41,285 sq km</p>
                <p><b>Population:</b> 9,007,798</p>
                <p><b>Capital:</b> Bern</p>
                <p><b>Languages:</b> German, French, Italian, Romansh</p>
                <p><b>Currency:</b> Swiss Franc</p>
            </section>

            <section class="card weather">
                <h3>Weather</h3>
                <p><b>Temperature:</b> <span id="temp">10</span>°C</p>
                <p><b>Conditions:</b> Partly Cloudy</p>
                <p><b>Wind:</b> <span id="wind">5</span> km/h</p>
                <p><b>Wind Chill:</b> <span id="windchill"></span></p> 
            </section>
        </div>
    </main>

    <footer>
  <div class="linea1">
    © <span id="currentyear"></span> | Gustavo Shuan | Peru
  </div>
  <div class="linea2">
    Last Modification: <span id="lastModified"></span>
  </div>
</footer>
</body>
</html>
